name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Web Assets
        run: |
          npm install
          npm run build

      - name: Setup Capacitor & Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "CricKashmir" "com.crickashmir.scorer" --web-dir=dist
          npx cap add android

      # FIXED: Overwriting BOTH legacy and modern adaptive icon layers
      - name: Apply Custom App Icon
        run: |
          # 1. Ensure all resolution directories exist
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # 2. Overwrite legacy flat icons
          cp public/favicon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/favicon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/favicon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/favicon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/favicon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          cp public/favicon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp public/favicon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp public/favicon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp public/favicon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp public/favicon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          # 3. Overwrite modern Adaptive Launcher layers (Foreground & Background)
          cp public/favicon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          cp public/favicon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          cp public/favicon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          cp public/favicon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          cp public/favicon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png

          cp public/favicon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_background.png
          cp public/favicon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_background.png
          cp public/favicon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_background.png
          cp public/favicon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_background.png
          cp public/favicon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_background.png

      - name: Sync Android Assets
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Force Single Kotlin Version & Compile
        run: |
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          sed -i '/allprojects {/a \    subprojects {\n        project.configurations.all {\n            resolutionStrategy.eachDependency { details ->\n                if (details.requested.group == "org.jetbrains.kotlin") {\n                    details.useVersion "1.9.22"\n                }\n            }\n        }\n    }' build.gradle
          
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: cric-kashmir-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
